name: Auto Tag Release

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - src-tauri/Cargo.toml
      - src-tauri/tauri.conf.json
  workflow_dispatch:

concurrency:
  group: auto-tag-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag-release:
    permissions:
      actions: write
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read synced version
        id: version
        shell: bash
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('node:fs');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const tauri = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
          const cargo = fs
            .readFileSync('src-tauri/Cargo.toml', 'utf8')
            .match(/^version = "([^"]+)"$/m);

          if (!cargo) {
            throw new Error('Could not read src-tauri/Cargo.toml version');
          }

          const versions = {
            package: pkg.version,
            tauri: tauri.version,
            cargo: cargo[1],
          };

          if (new Set(Object.values(versions)).size !== 1) {
            console.error(JSON.stringify(versions, null, 2));
            process.exit(1);
          }

          process.stdout.write(`version=${pkg.version}\n`);
          NODE

      - name: Create and push tag
        shell: bash
        run: |
          tag="v${{ steps.version.outputs.version }}"

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "OpinCode $tag"
          git push origin "$tag"

      - name: Dispatch release workflow
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ steps.version.outputs.version }}
        shell: bash
        run: |
          gh workflow run Release --repo "${{ github.repository }}" --ref "$TAG"
